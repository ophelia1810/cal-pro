<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Pro</title>
    <link rel="stylesheet" href="caculator.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator-wrapper">
        <!-- Header -->
        <div class="header">
          <h1>Calculator Pro</h1>
          <button class="theme-btn" id="themeBtn" title="Toggle theme">
            🌙
          </button>
        </div>

        <!-- Calculator -->
        <div class="calculator">
          <div class="display">
            <input type="text" id="result" readonly placeholder="0" />
          </div>
          <div class="buttons">
            <button class="btn func-btn" data-value="C">C</button>
            <button class="btn func-btn" data-value="DEL">←</button>
            <button class="btn operator-btn" data-value="/">÷</button>
            <button class="btn operator-btn" data-value="*">×</button>

            <button class="btn num-btn" data-value="7">7</button>
            <button class="btn num-btn" data-value="8">8</button>
            <button class="btn num-btn" data-value="9">9</button>
            <button class="btn operator-btn" data-value="-">−</button>

            <button class="btn num-btn" data-value="4">4</button>
            <button class="btn num-btn" data-value="5">5</button>
            <button class="btn num-btn" data-value="6">6</button>
            <button class="btn operator-btn" data-value="+">+</button>

            <button class="btn num-btn" data-value="1">1</button>
            <button class="btn num-btn" data-value="2">2</button>
            <button class="btn num-btn" data-value="3">3</button>
            <button class="btn equals-btn" data-value="=">=</button>

            <button class="btn num-btn zero" data-value="0">0</button>
            <button class="btn operator-btn" data-value=".">.</button>
          </div>
        </div>

        <!-- History -->
        <div class="history">
          <div class="history-header">
            <h3>History</h3>
            <button class="clear-history-btn" id="clearHistory">Clear</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </div>
      </div>
    </div>

    <!-- Premium Popup Modal -->
    <div class="modal" id="premiumModal">
      <div class="modal-content">
        <!-- Header -->
        <div class="modal-header">
          <div class="modal-title-group">
            <h2 class="modal-title">CalcPro</h2>
            <span class="free-badge">FREE PLAN</span>
          </div>
          <button class="modal-close" id="closeModal">&times;</button>
        </div>

        <!-- Lock Icon -->
        <div class="lock-section">
          <div class="lock-icon">🔒</div>
          <p>Unlock your result</p>
        </div>

        <!-- Message -->
        <p class="modal-message">
          You've used your 0 free calculations this month. Upgrade to see
          calculation
        </p>

        <!-- Pricing Plans -->
        <div class="pricing-plans">
          <div class="plan basic">
            <h3>BASIC</h3>
            <div class="price">$4.99</div>
            <p class="period">/mo</p>
            <p class="calculations">10 calcs</p>
          </div>
          <div class="plan pro selected">
            <div class="recommended">Recommended</div>
            <h3>PRO</h3>
            <div class="price">$19.99</div>
            <p class="period">/mo</p>
            <p class="calculations">Unlimited</p>
          </div>
          <div class="plan teams">
            <h3>TEAMS</h3>
            <div class="price">$49.99</div>
            <p class="period">/mo</p>
            <p class="calculations">5 users</p>
          </div>
        </div>

        <!-- Upgrade Button -->
        <button class="upgrade-btn" id="upgradeBtn">
          Upgrade to see result
        </button>

        <!-- Free Plan Note -->
        <p class="free-note">Free plan: 3 calculations/month</p>
      </div>
    </div>

    <script src="caculator.js"></script>
  </body>
</html>
